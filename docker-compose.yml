services:
  linear-connector:
    image: ghcr.io/fancymatt/openclaw-linear-connector:latest
    container_name: linear-connector
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      DATA_DIR: /data
      SECRETS_DIR: /secrets
      AGENTS_FILE: /config/agents.json
    volumes:
      - ./data:/data
      - ./secrets:/secrets
      - ./config/agents.json:/config/agents.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
