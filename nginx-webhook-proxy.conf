# Yaguchi nginx: Linear webhook proxy for ILL workspace
# Add this inside the nakazawa.fancyma.tt server block (alongside the existing /webhooks/linear)

location /webhooks/linear-ill {
    proxy_pass http://nakazawa.local:3457/webhooks/linear;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the Linear signature header unchanged
    proxy_set_header X-Linear-Signature $http_x_linear_signature;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
}
