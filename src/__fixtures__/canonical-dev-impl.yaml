# dev-impl — Archetype A workflow definition
# design.md §13, §16.1
# owner: steward (Astrid)
# version history: bump `version` on any state/edge change; in-flight tickets
#   use the version stamped at their creation time (design.md §12).
#
# Verbatim copy of the canonical vault file at:
#   ai-systems/projects/fleet-orchestration-redesign/workflows/dev-impl.yaml
# Used as a test fixture so CI can exercise the canonical schema without
# depending on the vault being present. Keep in sync with the vault source.
#
# Shape principle (design decision 2026-06-06): a STATE is a work-phase — one
#   kind of work, one owner role; "awaiting X" and "doing X" are the same state.
#   A TRANSITION is a decision/event (may carry payload) — never a resting place.
#   Decision-results (`approved`, `merged`) are transitions, not states.
#   Hanzo's container is the DEPLOYMENT container: merging is one operation it
#   authorizes (`deploy:execute`), not its definition.

id: dev-impl
version: 3
archetype: single-task         # single-task | orchestrator | feature-initiative
entry_state: intake

break_glass:
  command: escape               # x-openclaw-linear-intent value that triggers break-glass (§4.4)
  to: escape
  owner_role: steward           # implicit escape edge from EVERY state (design.md §4.4)

states:

  - id: intake
    owner_role: steward
    kind: normal
    transitions:
      - command: accept
        to: implementation
      - command: demote
        to: __ad_hoc__          # ticket leaves the workflow entirely (design.md §4.5)

  - id: implementation
    owner_role: dev
    kind: normal
    # entered from intake/accept, code-review/request-changes, and
    # deployment/reject — one dev work-phase, no awaiting-vs-doing split.
    transitions:
      - command: submit
        to: code-review

  - id: code-review
    owner_role: code-review
    kind: normal
    sla: 24h                    # time-in-state; breach → stall escalation (design.md §5.5)
    transitions:
      - command: approve
        to: deployment
      - command: request-changes
        to: implementation
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch

  - id: deployment
    owner_role: deployment      # filled by Hanzo; the deployment container (§16.2)
    kind: normal
    transitions:
      - command: deploy
        to: done
        requires_capability: deploy:execute   # Layer A enforcement (design.md §16.2)
      - command: reject
        to: implementation
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch

  - id: done
    kind: terminal
    satisfies_parent_barrier: true   # uniform terminal contract (design.md §5.4)

  - id: escape
    kind: terminal
    # break-glass terminal; steward decides if Matt escalation is warranted (design.md §11)
