# dev-impl — Archetype A workflow definition
# design.md §13, §16.1
# owner: steward (Astrid)
# version history: bump `version` on any state/edge change; in-flight tickets
#   use the version stamped at their creation time (design.md §12).
#
# Shape principle (design decision 2026-06-06): a STATE is a work-phase — one
#   kind of work, one owner role; "awaiting X" and "doing X" are the same state.
#   A TRANSITION is a decision/event (may carry payload) — never a resting place.
#   Decision-results (`approved`, `merged`) are transitions, not states.
#   Hanzo's container is the DEPLOYMENT container: merging is one operation it
#   authorizes (`deploy:execute`), not its definition.
#
# Native state projection (AI-1490): each state declares the semantic native
#   Linear state the CLI should project to when entering that state. v7 (AI-1510)
#   made native status a pure engagement overlay — every active work-phase rests
#   at `todo`; the connector cycles To Do → Thinking → Doing off the delegate's
#   session lifecycle. Terminal states keep semantic value (done→done).
#
# v8 (2026-06-10, Matt directive): test-driven + deploy-real + AC-gate shape.
#   New states: write-tests (TestDrivenDevelopmentAgent writes failing tests
#   before implementation), host-deploy (Grover, host-side, the bare-metal half
#   of deployment Hanzo's container can't reach), ac-validate (the intake steward
#   re-verifies the deployed artifact against the captured AC before done).
#   Also reconciled H-7 (AI-1482, Done) stakes/capture_ac/human-signoff config.
#
# v9 (2026-06-23): added generic transition tags (continue / revision) so
#   agents can use `linear continue-workflow` and `linear request-revision`
#   instead of workflow-specific command names. Also synced missing fields
#   from canonical fixture (unescape, SLAs, assign mode fixes).
#
# v10 (2026-06-28, AI-1710): escape is no longer a terminal state. escape now
#   re-enters the workflow at intake (break_glass.to: intake). The escape
#   terminal state and unescape transition are removed. Escape becomes a
#   clean restart: state/delegate/assignee cleared, ticket re-enters at intake.
#
# v11–v12 (2026-07-06, AI-1884): added the `merge` state + `merge` role — the
#   post-approve PR-merge phase split out from `deployment`; Hanzo fills both
#   `deployment` and `merge`. (Prior to this the def shipped with owner_role
#   `merge` and no declared role, failing every `approve` closed.)
#
# v13 (2026-07-07, AI-1872 — Matt directive): split the post-merge stage into
#   generic-verb states. The old `deployment` + `host-deploy` states (custom
#   verbs `deployed` / `handoff-host-deploy` / `host-deployed`) are collapsed
#   into a single `deploy` state exited by the generic `continue-workflow`.
#   Full spine: write-tests → implementation → code-review → merge → deploy →
#   ac-validate. This is a RECONCILIATION of the merged AI-1872 canonical
#   fixture (repo v10) onto live: the fixture had drifted from prod and would
#   have regressed three live-only settings had it been shipped verbatim, so
#   those are PRESERVED here — `recovery_actor: ai` (AI-1579), the `stakes:*`
#   label namespace (fixture reconciliation resolved stakes:* as canonical), and the `merge`
#   role owner (fixture reverted it to `deployment`). Deployed by Grover
#   (host-deploy role). Repo test fixture should be refreshed to match — tracked
#   as a follow-up; the connector loads THIS instance file, not the fixture.
#
# v15 (2026-07-16, AI-2463): added `ac-mismatch` command from `ac-validate` to
#   `deploy` — a redeploy edge for stale-artifact scenarios. Previously the only
#   legal exit from ac-validate was `validated` → done or `ac-fail` →
#   implementation (dev role), which assumes a code fault. ac-mismatch routes
#   back to the deployer (host-deploy / Grover) without passing through a dev
#   body, since the code is correct. Also updated ac-validate step guidance to
#   reference the `deploy` state (v13 name) instead of the deleted `deployment`
#   and `host-deploy` states (pre-v13 names).

id: dev-impl
version: 16
archetype: single-task         # single-task | orchestrator | feature-initiative
entry_state: intake

# AI-1579 (2026-06-13): recovery actor. `ai` (the orchestrator, fills no workflow
# role) may re-establish a delegate on a ticket whose delegate is currently EMPTY
# (orphaned) at ANY state — the authorization counterpart to the stale-session
# recovery machinery. Scoped to the empty-delegate path only.
recovery_actor: ai

# Phase 6.5 / H-7 (AI-1482): Stakes-threshold sign-off configuration.
# When a ticket's stakes level meets or exceeds the threshold, the release
# transition requires a human sign-off (Matt), not an AI agent.
# Stakes levels: 0 = low (internal only), 1 = medium, 2 = high (external/irreversible).
# Labels on the ticket: stakes:low, stakes:medium, stakes:high.
stakes:
  threshold: 2                # release from stakes ≥ this level requires human sign-off
  levels:                     # label name → numeric level mapping
    stakes:low: 0
    stakes:medium: 1
    stakes:high: 2

break_glass:
  command: escape               # x-openclaw-linear-intent value that triggers break-glass (§4.4)
  to: intake                   # AI-1710: escape re-enters at intake, not a terminal
  owner_role: steward           # implicit escape edge from EVERY state (design.md §4.4)

states:

  - id: intake
    owner_role: steward
    kind: normal
    native_state: todo           # intake itself is Todo
    transitions:
      - command: accept
        to: write-tests
        assign: { mode: auto }     # test-author is singleton (TestDrivenDevelopmentAgent) — auto-assign
        generic: continue
        # Phase 6.5 / H-7 (AI-1482): capture verbatim AC from the issue description
        # as the AC of record. ac-validate judges the outcome against this snapshot.
        capture_ac: true
      - command: demote
        to: __ad_hoc__          # ticket leaves the workflow entirely (design.md §4.5)
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: intake
        assign:
          mode: required

  - id: write-tests
    owner_role: test-author     # TestDrivenDevelopmentAgent; dev container (§16.2)
    kind: normal
    native_state: todo          # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 48h                    # G-5: per-state SLA; breach → stall escalation
    # Adversarial-rigor split (design note a, 2026-06-10): a dedicated agent
    # writes FAILING tests covering all in-scope AC before any implementation,
    # so an implementer can never fudge test robustness to pass their own work.
    # test-author is NOT a dev body, so it can never be assigned implementation.
    transitions:
      - command: tests-ready
        to: implementation
        assign: { mode: required }     # dev is multi-body (felix/noah/sage/igor) — target required, validated vs dev role
        generic: continue
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: write-tests
        assign:
          mode: required

  - id: implementation
    owner_role: dev
    kind: normal
    native_state: todo           # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 72h                    # G-5: per-state SLA; longer than code-review
    # entered from write-tests/tests-ready, code-review/request-changes,
    # merge/reject, deploy/reject, ac-validate/ac-fail — one dev
    # work-phase, no awaiting-vs-doing split. Dev makes the failing tests pass.
    transitions:
      - command: submit
        to: code-review
        assign:
          mode: required          # reviewer must be explicitly specified (§4.3)
          constraint: not-implementer  # reviewer must differ from implementer (AI-1475 D2)
        generic: continue
        requires_comment: true

  - id: code-review
    owner_role: code-review
    kind: normal
    native_state: todo           # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 24h                    # G-5: per-state SLA; breach → stall escalation (design.md §5.5)
    # Review contract (v8): reviewer runs the FULL test suite. Any red ⇒
    # request-changes with the failing tests named. `approve` is
    # legal only when the suite is green AND code quality satisfies the reviewer.
    transitions:
      - command: approve
        to: merge
        assign: { mode: auto }     # merge is singleton (Hanzo) — auto-assign
        generic: continue
      - command: request-changes
        to: implementation
        generic: revision
        requires_comment: true
        assign: { default: prior-implementer }
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: code-review
        assign:
          mode: required

  - id: merge
    owner_role: merge           # filled by Hanzo; the merge container (§16.2)
    kind: normal
    native_state: todo           # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 2h                     # G-5: per-state SLA; merge is quick — gate-cleared PR → rebase + merge
    # AI-1872: merge is purely the PR-merge phase. Once merged, `continue-workflow`
    # advances to `deploy` (generic verb), where the deployer decides whether a
    # deploy action is needed. Custom verbs removed — the exit is generic continue.
    transitions:
      - command: continue
        to: deploy
        requires_capability: deploy:execute   # Layer A: only the deploy:execute holder (Hanzo) merges
        requires_human_signoff_above_stakes: true
        assign: { mode: auto }     # deploy is singleton (Grover for the connector fleet) — auto-assign
        generic: continue
      - command: reject
        to: implementation
        assign:
          mode: required
          constraint: not-implementer
          default: prior-implementer
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch
        generic: revision
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: merge
        assign:
          mode: required

  - id: deploy
    owner_role: host-deploy     # Grover for the connector fleet; configurable per project (§16.2)
    kind: normal
    native_state: todo           # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 8h                     # G-5: per-state SLA; deploy may need host access
    # AI-1872: single post-merge deploy phase (replaces deployment + host-deploy).
    # The deployer deploys the artifact — restart connector + roll CLI, run
    # migrations, push builds — OR decides "no deploy needed" (library release,
    # CI auto-deploy, docs/config-only) and continues forward. Either way the exit
    # is the generic `continue-workflow`. Host-side ops require infra:ssh (NOT
    # deploy:execute — the merge already happened in `merge`).
    # ci_auto_deploy policy (config/deploy-policy.yaml, AI-1795) still informs the
    # deployer whether a host deploy is expected vs. CI-handled.
    transitions:
      - command: continue
        to: ac-validate
        requires_capability: infra:ssh
        requires_human_signoff_above_stakes: true
        assign: { mode: auto }     # ac-validate steward is singleton (Astrid) — auto-assign
        generic: continue
      - command: reject
        to: implementation
        assign:
          mode: required
          constraint: not-implementer
          default: prior-implementer
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch
        generic: revision
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: deploy
        assign:
          mode: required

  - id: ac-validate
    owner_role: steward         # the SAME steward (Astrid) who validated AC at intake
    kind: normal
    native_state: todo           # v7 (AI-1510): resting; connector cycles thinking/doing off engagement
    sla: 24h                    # G-5: per-state SLA; final gate validation
    # Final gate (v8): re-verify the DEPLOYED artifact
    # satisfies the acceptance criteria in real conditions before `done`.
    # AI-2463 (2026-07-16): added ac-mismatch → deploy edge so a validator who
    # finds a stale artifact can route back to the deployer instead of only
    # having ac-fail → implementation (which assumes a code fault).
    # The intended target for ac-mismatch is a host-deploy body (Grover for the
    # connector fleet) — not a dev body, since the code is correct.
    transitions:
      - command: validated
        to: done
        # terminal → no assignment
        generic: continue
      - command: ac-fail
        to: implementation
        requires_comment: true
        assign: { default: prior-implementer }
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch
        generic: revision
      - command: ac-mismatch
        to: deploy
        requires_comment: true
        feedback:
          required: true
          category_enum:
            - ac-mismatch
            - stale-artifact
        assign:
          mode: auto           # host-deploy is singleton (Grover) — auto-assign
        # ac-mismatch does NOT reassign to role 'dev' — the code is correct;
        # the artifact is stale. Routes back to the deploy state where the same
        # deployer (host-deploy / Grover) can redeploy with full context.
        generic: continue
      # INF-150: handoff self-loop — re-attach delegate without changing state
      - command: handoff
        to: ac-validate
        assign:
          mode: required

  - id: done
    kind: terminal
    native_state: done           # targetState: "done" → Done
    satisfies_parent_barrier: true   # uniform terminal contract (design.md §5.4)

