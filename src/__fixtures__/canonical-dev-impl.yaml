# dev-impl — Archetype A workflow definition
# design.md §13, §16.1
# owner: steward (Astrid)
# version history: bump `version` on any state/edge change; in-flight tickets
#   use the version stamped at their creation time (design.md §12).
#
# Verbatim copy of the canonical vault file at:
#   ai-systems/projects/fleet-orchestration-redesign/workflows/dev-impl.yaml
# Used as a test fixture so CI can exercise the canonical schema without
# depending on the vault being present. Keep in sync with the vault source.
#
# Shape principle (design decision 2026-06-06): a STATE is a work-phase — one
#   kind of work, one owner role; "awaiting X" and "doing X" are the same state.
#   A TRANSITION is a decision/event (may carry payload) — never a resting place.
#   Decision-results (`approved`, `merged`) are transitions, not states.
#   Hanzo's container is the DEPLOYMENT container: merging is one operation it
#   authorizes (`deploy:execute`), not its definition.
#
# Native state projection (AI-1490): each state declares the semantic native
#   Linear state the CLI should project to when entering that state. This field
#   is validated at connector startup — if any native_state doesn't resolve to
#   an actual Linear workflow state on the team, the connector alerts. The CLI
#   remains the authoritative native-state setter (via targetState); this field
#   is a contract that the CLI's targetState must satisfy.

id: dev-impl
version: 6
archetype: single-task         # single-task | orchestrator | feature-initiative
entry_state: intake

# Phase 6.5 / H-7 (AI-1482): Stakes-threshold sign-off configuration.
# When a ticket's stakes level meets or exceeds the threshold, the deploy
# transition requires a human sign-off (Matt), not an AI agent.
# Stakes levels: 0 = low (internal only), 1 = medium, 2 = high (external/irreversible).
# Labels on the ticket: stakes:low, stakes:medium, stakes:high.
stakes:
  threshold: 2                # deploy from stakes ≥ this level requires human sign-off
  levels:                     # label name → numeric level mapping
    stakes:low: 0
    stakes:medium: 1
    stakes:high: 2

break_glass:
  command: escape               # x-openclaw-linear-intent value that triggers break-glass (§4.4)
  to: escape
  owner_role: steward           # implicit escape edge from EVERY state (design.md §4.4)

states:

  - id: intake
    owner_role: steward
    kind: normal
    native_state: todo           # accept → Doing; intake itself is Todo
    transitions:
      - command: accept
        to: implementation
        assign: { mode: required }
        # Phase 6.5 / H-7 (AI-1482): capture verbatim AC from the issue description
        # as the AC of record. Ai may annotate alongside, but sign-off is judged
        # against the verbatim original.
        capture_ac: true
      - command: demote
        to: __ad_hoc__          # ticket leaves the workflow entirely (design.md §4.5)

  - id: implementation
    owner_role: dev
    kind: normal
    native_state: doing          # targetState: "doing" → Doing/In Progress
    # entered from intake/accept, code-review/request-changes, and
    # deployment/reject — one dev work-phase, no awaiting-vs-doing split.
    transitions:
      - command: submit
        to: code-review
        assign:
          mode: required          # reviewer must be explicitly specified (§4.3)
          constraint: not-implementer  # reviewer must differ from implementer (AI-1475 D2)

  - id: code-review
    owner_role: code-review
    kind: normal
    native_state: thinking       # targetState: "thinking" → Thinking/In Progress
    sla: 24h                    # time-in-state; breach → stall escalation (design.md §5.5)
    transitions:
      - command: approve
        to: deployment
        assign: { mode: auto }
      - command: request-changes
        to: implementation
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch

  - id: deployment
    owner_role: deployment      # filled by Hanzo; the deployment container (§16.2)
    kind: normal
    native_state: doing          # targetState: "doing" → Doing/In Progress
    transitions:
      - command: deploy
        to: done
        requires_capability: deploy:execute   # Layer A enforcement (design.md §16.2)
        # Phase 6.5 / H-7 (AI-1482): stakes-threshold gate.
        # If the ticket's stakes level ≥ workflow.stakes.threshold, the deploy
        # must come from a human sign-off (not an AI agent). Enforced by the
        # connector proxy at deploy time.
        requires_human_signoff_above_stakes: true
      - command: reject
        to: implementation
        feedback:
          required: true
          category_enum:
            - missing-tests
            - style
            - scope-creep
            - correctness
            - ac-mismatch

  - id: done
    kind: terminal
    native_state: done           # targetState: "done" → Done
    satisfies_parent_barrier: true   # uniform terminal contract (design.md §5.4)

  - id: escape
    kind: terminal
    native_state: invalid        # targetState: "invalid" → Invalid (canceled-type terminal)
    # break-glass terminal; steward decides if Matt escalation is warranted (design.md §11)
