# sprint-arm-spike — dev-sprint shaping-arm archetype (spike)
# spec of record: life-os/project-management/dev-sprint-workflow-spec.md (vault,
#   approved by Matt 2026-07-08). AI-1993.
# owner: dev (a dev-container body) runs the throwaway spike; charles reviews it.
#
# One of the four shaping arms fanned out by dev-sprint at spawn-arms. Uniform
# doing → review → done shape; done carries satisfies_parent_barrier: true so
# the parent managing-arms barrier auto-advances only when all four arms
# terminate cleanly (AI-1992 engine).
#
# Authority (spec table): the spike is REVIEWED by charles (engineering-
# standards steward) — review.owner_role: code-review resolves to charles. The
# spike is a feasibility prototype, so a dev body does the work and charles
# confirms the findings before the arm closes.

id: sprint-arm-spike
version: 1
archetype: single-task
entry_state: doing

break_glass:
  command: escape
  to: escape
  owner_role: steward

states:

  - id: doing
    owner_role: dev                   # felix/noah/sage/igor — a dev-container body
    kind: normal
    native_state: doing
    # Run the throwaway prototype, capture the feasibility verdict + findings,
    # then hand to charles for review.
    transitions:
      - command: submit
        to: review
        assign:
          mode: auto                  # review is charles (singleton code-review)
          constraint: not-implementer # reviewer must differ from the spike author
        generic: continue

  - id: review
    owner_role: code-review           # resolves to charles
    kind: normal
    native_state: todo
    # charles reviews the spike findings, then completes the arm (done) or
    # bounces it back to doing.
    transitions:
      - command: approve
        to: done
        generic: continue
      - command: request-changes
        to: doing
        assign:
          mode: required
          constraint: not-implementer
          default: prior-implementer
        generic: revision
        feedback:
          required: true
          category_enum:
            - incomplete
            - off-brief
            - scope-creep
            - correctness

  - id: done
    kind: terminal
    native_state: done
    satisfies_parent_barrier: true   # signals the parent managing-arms barrier

  - id: escape
    kind: terminal
    native_state: invalid            # abnormal termination → Canceled column
