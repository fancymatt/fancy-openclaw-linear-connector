# dev-sprint — Sprint Execution Workflow (v4)
# owner: steward (Astrid), engine (spawn-arms, spawn-impl)
# last-updated: 2026-07-20
# status: v2 deployed to production (INF-40, 2026-07-16)
#
# AI-2524 (2026-07-17): added the `post-validation` state — a conditional
# ui-audit gate at milestone close. `validation → approve` now routes to
# `post-validation` (not directly to `done`); that state fans out into a
# wf:ui-audit child ONLY when a closed impl child carries the `ui-impact`
# label (spawn_if, AI-2523). The visual-audit verdict is a gate input to
# milestone close. See spec §5 (hard rule) and the milestone-close
# verification template (src/dev-sprint-milestone-close-template.ts).
#
# Registered-def copy for CI conformance validation (INF-42). The canonical
# source is the vault markdown spec at:
#   life-os/project-management/workflows/dev-sprint/dev-sprint-workflow-spec.md
# Keep in sync with that spec.
#
# v3 (2026-07-17, AI-2524): added `post-validation` state — conditional
#   visual-audit gate (see REGISTERED_DEFS_CHANGELOG).
# v4 (2026-07-20, P2(d) AGI-16): escape now re-enters at intake instead of
#   terminating. A wedged sprint can be recovered by breaking glass, following
#   the same pattern as dev-impl v9 (AI-1710).
#
# INF-45 (2026-07-16): added to registered-defs as child_workflow target
# for sprint-spawner's launching state (fanout: wf:dev-sprint).
#
# Arm workflows (wf:sprint-arm-scope, wf:sprint-arm-ux, wf:sprint-arm-design,
# wf:sprint-arm-spike) are registered as v0 stubs in src/registered-defs/.
# They match the arm archetype table in dev-sprint-workflow-spec.md.
#
# Sprint spine (from dev-sprint-workflow-spec.md):
#   1. intake → 2. product-definition → 3. spawn-arms → 4. managing-arms
#   → 5. ac-definition → 6. spawn-impl → 7. managing-impl → 8. validation → done

id: dev-sprint
version: 4
archetype: orchestrator
entry_state: intake

# v4: escape → intake migration for in-flight tickets
migrations:
  escape: intake

break_glass:
  command: escape
  to: intake            # v4: re-enter at intake instead of terminating
  owner_role: steward

states:

  - id: intake
    owner_role: steward
    kind: normal
    native_state: todo
    description: >
      Capture Matt's sprint description; set project/milestone; sanity-check
      scope is sprint-shaped.
    transitions:
      - command: accept
        to: product-definition
        generic: continue          # AI-2519: `linear continue-workflow` resolves

  - id: product-definition
    owner_role: steward
    kind: normal
    native_state: doing
    description: >
      Problem statement, target user, success criteria, scope boundary (in/out),
      MVP definition. Decides arm composition (spike in/out, design arm in/out
      for backend-only sprints). Output: structured brief + arm spawn spec.
    transitions:
      - command: continue
        to: spawn-arms
        generic: continue

  - id: spawn-arms
    owner_role: engine
    kind: normal
    native_state: doing
    description: >
      Fanout phase 1: create arm tickets from spec. Each is a wf:sprint-arm-*
      ticket, parentId = sprint.
    # INF-45 (2026-07-16): arm workflows registered as v0 stubs
    # (sprint-arm-scope, sprint-arm-ux, sprint-arm-design, sprint-arm-spike).
    fanout:
      spec_source: structured
      child_workflow: wf:sprint-arm-scope    # representative — actual per-arm spec in source
      initial_delegate: astrid
    transitions:
      - command: spawn
        to: managing-arms
        generic: continue

  - id: managing-arms
    owner_role: steward
    kind: barrier
    barrier: true
    native_state: managing
    description: >
      Barrier: all arm children terminal → auto-advance.
    transitions:
      - command: continue
        to: ac-definition
        generic: continue

  - id: ac-definition
    owner_role: steward
    kind: normal
    native_state: doing
    description: >
      Synthesize arm outputs → sprint-level AC of record + impl spawn spec:
      enumerated impl tickets (wf:dev-impl or wf:task), titles, AC, scope labels,
      blocking relations. Must include >=1 debt/refactor ticket or documented waiver.
    transitions:
      - command: continue
        to: spawn-impl
        generic: continue

  - id: spawn-impl
    owner_role: engine
    kind: normal
    native_state: doing
    description: >
      Fanout phase 2: create impl tickets from spec. Children are wf:dev-impl
      (default) or wf:task. Both are registered defs.
    fanout:
      spec_source: findings
      child_workflow: wf:dev-impl
      initial_delegate: astrid
    transitions:
      - command: spawn
        to: managing-impl
        generic: continue

  - id: managing-impl
    owner_role: steward
    kind: barrier
    barrier: true
    native_state: managing
    description: >
      Barrier: all children terminal → auto-advance. Astrid runs board-review
      discipline; stall handling via existing sweeps.
    transitions:
      - command: continue
        to: validation
        generic: continue

  - id: validation
    owner_role: steward
    kind: normal
    native_state: thinking
    description: >
      Author Matt-facing sprint validation. cra reviews technical accuracy.
      requires_human_signoff_above_stakes — the human sign-off is captured HERE,
      on Matt's explicit yes. On approve the sprint advances to post-validation
      (the mechanical visual-audit gate), not directly to done.
    transitions:
      - command: approve
        to: post-validation
        generic: continue
        requires_human_signoff_above_stakes: true
      - command: reject
        to: ac-definition
        generic: revision

  - id: post-validation
    owner_role: steward
    kind: normal
    native_state: doing
    description: >
      AI-2524: conditional visual-audit gate at milestone close. Fans out into a
      wf:ui-audit child ONLY when a closed impl child carries the `ui-impact`
      label (spawn_if, AI-2523); otherwise the gate is a no-op and the sprint
      continues to done. The human sign-off was already captured at
      validation→approve, so this transition is mechanical (no signoff). The
      milestone-close verification comment carries the Visual Audit breakpoint
      table + sign-off checkbox (see dev-sprint-milestone-close-template.ts).
    fanout:
      spec_source: findings
      child_workflow: wf:ui-audit
      initial_delegate: astrid
      spawn_if:
        label_present: ui-impact
        scope: closed_children
    transitions:
      - command: continue
        to: done
        generic: continue

  - id: done
    kind: terminal
    barrier: true
    native_state: done
    satisfies_parent_barrier: true

  # v4: escape terminal state removed — break_glass now re-enters at intake
