name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

  build-amd64:
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive arch-suffixed tags
        id: archtags
        env:
          TAGS_META: ${{ needs.meta.outputs.tags }}
        run: |
          {
            echo "tags<<TAGS_EOF"
            if [ -n "$TAGS_META" ]; then
              echo "$TAGS_META" | sed 's/$/-amd64/'
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.archtags.outputs.tags }}
          labels: ${{ needs.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    needs: [meta]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive arch-suffixed tags
        id: archtags
        env:
          TAGS_META: ${{ needs.meta.outputs.tags }}
        run: |
          {
            echo "tags<<TAGS_EOF"
            if [ -n "$TAGS_META" ]; then
              echo "$TAGS_META" | sed 's/$/-arm64/'
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          provenance: false
          push: true
          tags: ${{ steps.archtags.outputs.tags }}
          labels: ${{ needs.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    needs: [meta, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        env:
          TAGS_META: ${{ needs.meta.outputs.tags }}
        run: |
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            AMD64="${TAG}-amd64"
            ARM64="${TAG}-arm64"
            echo "Creating manifest: ${TAG} ← ${AMD64} + ${ARM64}"
            docker buildx imagetools create \
              -t "${TAG}" \
              "${AMD64}" \
              "${ARM64}"
          done <<< "$TAGS_META"
      - name: Verify manifests
        env:
          TAGS_META: ${{ needs.meta.outputs.tags }}
        run: |
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "=== ${TAG} ==="
            docker buildx imagetools inspect "${TAG}" 2>/dev/null | head -8
          done <<< "$TAGS_META"
