# Merged by Hanzo — do not merge this file yourself
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check package.json integrity
        run: npm run check:json-keys

      - name: Build (tsc)
        run: npm run build

      - name: Test (jest)
        run: npm test
        env:
          LINEAR_WEBHOOK_SECRET: test-secret-for-ci
          LOG_LEVEL: error

  security-bandit:
    name: Security - bandit (Python SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit --recursive apps/mam-downloader --severity-level medium --ini .bandit

  security-pip-audit:
    name: Security - pip-audit (dependency CVEs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit and dependencies from pyproject.toml
        run: |
          pip install pip-audit
          pip install -e apps/mam-downloader

      - name: Run pip-audit against pinned deps
        run: pip-audit

  security-trufflehog:
    name: Security - trufflehog (secrets scanning)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          only_verified: true
