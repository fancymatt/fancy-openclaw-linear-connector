name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check package.json integrity
        run: npm run check:json-keys

      - name: Build (tsc)
        run: npm run build

      - name: Test (jest)
        run: npm test
        env:
          LINEAR_WEBHOOK_SECRET: test-secret-for-ci
          LOG_LEVEL: error
